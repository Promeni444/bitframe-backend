<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitFrame | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --accent: #00d2ff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 500px; }

        .premium-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2, h3 { margin-top: 0; color: var(--accent); text-align: center; }

        .input-group { display: flex; flex-direction: column; gap: 15px; }
        
        label { font-size: 0.9rem; color: #ccc; margin-bottom: -10px; }

        input, textarea {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        .btn-main {
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            border: none;
            padding: 16px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4); }

        .message-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .msg-info b { color: var(--accent); display: block; font-size: 0.9rem; }
        .msg-info span { font-size: 0.95rem; opacity: 0.9; }
        
        .btn-del {
            background: rgba(255, 75, 43, 0.15);
            border: 1px solid #ff4b2b;
            color: #ff4b2b;
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="premium-card">
        <h2>BitFrame Bot</h2>
        <div class="input-group">
            <label>Номер получателя</label>
            <input type="text" id="phone" placeholder="992XXXXXXXXX">
            
            <label>Дата отправки</label>
            <input type="date" id="date">
            
            <label>Время отправки</label>
            <input type="time" id="time">
            
            <label>Сообщение</label>
            <textarea id="message" placeholder="Введите текст..." rows="3"></textarea>
            
            <button class="btn-main" onclick="sendToFirebase()">Запланировать</button>
        </div>
    </div>

    <div class="premium-card">
        <h3><i class="fas fa-clock"></i> Активные задачи</h3>
        <div id="pending-list"></div>
    </div>
</div>

<script>
    // Твои настройки Firebase
    const firebaseConfig = {
        databaseURL: "https://bitframe-autosender-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Установка сегодняшней даты по умолчанию
    document.getElementById('date').valueAsDate = new Date();

    function sendToFirebase() {
        const phone = document.getElementById('phone').value;
        const date = document.getElementById('date').value;
        const time = document.getElementById('time').value;
        const message = document.getElementById('message').value;

        if(!phone || !date || !time || !message) return alert("Заполни все поля!");

        db.ref('scheduled_messages').push({
            phone: phone,
            date: date, // Сохраняем дату
            time: time,
            message: message,
            status: 'pending'
        });
        alert("Добавлено в список!");
        document.getElementById('message').value = '';
    }

    function deleteMsg(id) {
        if(confirm("Удалить это упоминание?")) {
            db.ref('scheduled_messages/' + id).remove();
        }
    }

    db.ref('scheduled_messages').on('value', (snapshot) => {
        const data = snapshot.val();
        const pList = document.getElementById('pending-list');
        pList.innerHTML = '';

        for (let id in data) {
            const m = data[id];
            if(m.status === 'pending') {
                pList.innerHTML += `
                    <div class="message-item">
                        <div class="msg-info">
                            <b>${m.date} в ${m.time}</b>
                            <b>К номеру: ${m.phone}</b>
                            <span>${m.message}</span>
                        </div>
                        <button class="btn-del" onclick="deleteMsg('${id}')">Удалить</button>
                    </div>`;
            }
        }
    });
</script>

</body>
</html>
