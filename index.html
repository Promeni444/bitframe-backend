<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitFrame Premium | Admin</title>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --accent: #00d2ff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 600px; margin: 0 auto; }

        .premium-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2, h3 { margin-top: 0; color: var(--accent); }

        /* Форма ввода */
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        input, textarea {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            color: white;
            outline: none;
        }

        .btn-main {
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            border: none;
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4); }

        /* Списки сообщений */
        .message-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .msg-info b { color: var(--accent); display: block; }
        
        .btn-del {
            background: rgba(255, 75, 43, 0.2);
            border: 1px solid #ff4b2b;
            color: #ff4b2b;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .badge-sent { color: #00ff88; font-weight: 600; font-size: 0.8rem; }

        /* To-Do Секция */
        .todo-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .history-section { opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <div class="premium-card">
        <h2><i class="fas fa-paper-plane"></i> Новое упоминание</h2>
        <div class="input-group">
            <input type="text" id="phone" placeholder="Номер (992XXXXXXXXX)">
            <input type="time" id="time">
            <textarea id="message" placeholder="Текст сообщения..." rows="3"></textarea>
            <button class="btn-main" onclick="sendToFirebase()">Запланировать</button>
        </div>
    </div>

    <!-- В ПЛАНАХ -->
    <div class="premium-card">
        <h3><i class="fas fa-clock"></i> В планах</h3>
        <div id="pending-list"></div>
    </div>

    <!-- TO-DO СПИСОК -->
    <div class="premium-card">
        <h3><i class="fas fa-check-double"></i> Список дел</h3>
        <div class="input-group" style="flex-direction: row;">
            <input type="text" id="todo-input" style="flex:1" placeholder="Купить хлеб...">
            <button class="btn-main" onclick="addTodo()">+</button>
        </div>
        <div id="todo-list"></div>
    </div>

    <!-- ИСТОРИЯ -->
    <div class="premium-card history-section">
        <h3><i class="fas fa-history"></i> История</h3>
        <div id="history-list"></div>
    </div>
</div>

<script>
    // Твои настройки Firebase
    const firebaseConfig = {
        databaseURL: "https://bitframe-autosender-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Отправка сообщения в базу
    function sendToFirebase() {
        const phone = document.getElementById('phone').value;
        const time = document.getElementById('time').value;
        const message = document.getElementById('message').value;

        if(!phone || !time || !message) return alert("Заполни все поля!");

        db.ref('scheduled_messages').push({
            phone: phone,
            time: time,
            message: message,
            status: 'pending'
        });
        alert("Запланировано!");
    }

    // 2. Удаление сообщения
    function deleteMsg(id) {
        if(confirm("Удалить задачу?")) {
            db.ref('scheduled_messages/' + id).remove();
        }
    }

    // 3. Логика To-Do
    function addTodo() {
        const text = document.getElementById('todo-input').value;
        if(text) db.ref('todos').push({ text: text });
        document.getElementById('todo-input').value = '';
    }

    function deleteTodo(id) {
        db.ref('todos/' + id).remove();
    }

    // 4. Слушатель данных (Обновление интерфейса)
    db.ref('scheduled_messages').on('value', (snapshot) => {
        const data = snapshot.val();
        const pList = document.getElementById('pending-list');
        const hList = document.getElementById('history-list');
        pList.innerHTML = ''; hList.innerHTML = '';

        for (let id in data) {
            const m = data[id];
            const card = `
                <div class="message-item">
                    <div class="msg-info">
                        <b>${m.time} | ${m.phone}</b>
                        <span>${m.message}</span>
                    </div>
                    ${m.status === 'pending' ? 
                        `<button class="btn-del" onclick="deleteMsg('${id}')">Удалить</button>` : 
                        `<span class="badge-sent">✓ Отправлено</span>`}
                </div>`;
            
            if(m.status === 'pending') pList.innerHTML += card;
            else hList.innerHTML += card;
        }
    });

    db.ref('todos').on('value', (snapshot) => {
        const data = snapshot.val();
        const tList = document.getElementById('todo-list');
        tList.innerHTML = '';
        for (let id in data) {
            tList.innerHTML += `
                <div class="todo-item">
                    <span>${data[id].text}</span>
                    <i class="fas fa-trash" style="color:#ff4b2b; cursor:pointer" onclick="deleteTodo('${id}')"></i>
                </div>`;
        }
    });
</script>

</body>
</html>
